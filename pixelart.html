<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Editor - AllSite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .pixel-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .editor-layout {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 2rem;
            margin: 2rem 0;
        }

        .tool-panel {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow);
        }

        .tool-panel h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        #pixelCanvas {
            border: 3px solid var(--primary);
            border-radius: 10px;
            cursor: crosshair;
            image-rendering: pixelated;
            background: white;
            box-shadow: 0 10px 30px var(--shadow);
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
        }

        .tool-btn {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: var(--bg);
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .tool-btn:hover {
            background: var(--primary);
            color: white;
        }

        .tool-btn.active {
            background: var(--primary);
            color: white;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .color-swatch {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: var(--text);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .size-control {
            margin: 1rem 0;
        }

        .size-control input {
            width: 100%;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .preset-btn {
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .preset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .layer-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .layer-item {
            padding: 0.8rem;
            background: var(--bg);
            margin: 0.5rem 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .layer-item.active {
            background: var(--primary);
            color: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        @media (max-width: 1200px) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎨 Pixel Art</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="drawing.html">Drawing</a></li>
            <li><a href="pixelart.html">Pixel Art</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="casino.html">Casino</a></li>
            <li><a href="ru.html">RU</a></li>
            <li><a href="index.html">EN</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </nav>

    <div class="pixel-container">
        <h1 style="text-align: center;">🎨 Pixel Art Editor</h1>

        <div class="editor-layout">
            <div class="tool-panel">
                <h3>🛠️ Tools</h3>
                <button class="tool-btn active" onclick="setTool('pen')">✏️ Pen</button>
                <button class="tool-btn" onclick="setTool('eraser')">🧹 Eraser</button>
                <button class="tool-btn" onclick="setTool('fill')">🪣 Fill</button>
                <button class="tool-btn" onclick="setTool('eyedropper')">💧 Eyedropper</button>
                <button class="tool-btn" onclick="setTool('line')">📏 Line</button>
                <button class="tool-btn" onclick="setTool('rectangle')">⬜ Rectangle</button>
                <button class="tool-btn" onclick="setTool('circle')">⭕ Circle</button>

                <h3 style="margin-top: 2rem;">🎨 Colors</h3>
                <div class="color-grid" id="colorGrid"></div>
                <input type="color" id="customColor" value="#000000" style="width: 100%; height: 50px; margin-top: 1rem;">

                <h3 style="margin-top: 2rem;">📏 Canvas Size</h3>
                <div class="preset-grid">
                    <button class="preset-btn" onclick="setCanvasSize(16)">16x16</button>
                    <button class="preset-btn" onclick="setCanvasSize(32)">32x32</button>
                    <button class="preset-btn" onclick="setCanvasSize(64)">64x64</button>
                    <button class="preset-btn" onclick="setCanvasSize(128)">128x128</button>
                </div>
            </div>

            <div>
                <div class="canvas-wrapper">
                    <canvas id="pixelCanvas" width="512" height="512"></canvas>
                </div>
            </div>

            <div class="tool-panel">
                <h3>💾 Actions</h3>
                <button class="tool-btn" onclick="clearCanvas()">🗑️ Clear</button>
                <button class="tool-btn" onclick="saveImage()">💾 Save PNG</button>
                <button class="tool-btn" onclick="loadImage()">📂 Load</button>
                <button class="tool-btn" onclick="undo()">↩️ Undo</button>
                <button class="tool-btn" onclick="redo()">↪️ Redo</button>

                <h3 style="margin-top: 2rem;">🖼️ Gallery</h3>
                <div class="gallery" id="gallery"></div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        // Pixel Art Editor
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        let gridSize = 32;
        let pixelSize = canvas.width / gridSize;
        let currentColor = '#000000';
        let currentTool = 'pen';
        let isDrawing = false;
        let pixels = [];
        let history = [];
        let historyStep = -1;

        const defaultColors = [
            '#000000', '#FFFFFF', '#FF0000', '#00FF00', '#0000FF',
            '#FFFF00', '#FF00FF', '#00FFFF', '#FFA500', '#800080',
            '#FFC0CB', '#A52A2A', '#808080', '#FFD700', '#4B0082',
            '#FF1493', '#00CED1', '#32CD32', '#FF4500', '#9370DB'
        ];

        function initPixels() {
            pixels = [];
            for (let y = 0; y < gridSize; y++) {
                pixels[y] = [];
                for (let x = 0; x < gridSize; x++) {
                    pixels[y][x] = '#FFFFFF';
                }
            }
            saveHistory();
        }

        function drawGrid() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    ctx.fillStyle = pixels[y][x];
                    ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                }
            }

            ctx.strokeStyle = '#E0E0E0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * pixelSize, 0);
                ctx.lineTo(i * pixelSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * pixelSize);
                ctx.lineTo(canvas.width, i * pixelSize);
                ctx.stroke();
            }
        }

        function getPixelCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / pixelSize);
            const y = Math.floor((e.clientY - rect.top) / pixelSize);
            return { x, y };
        }

        function setPixel(x, y, color) {
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
                pixels[y][x] = color;
            }
        }

        function floodFill(x, y, targetColor, fillColor) {
            if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) return;
            if (pixels[y][x] !== targetColor || pixels[y][x] === fillColor) return;

            pixels[y][x] = fillColor;

            floodFill(x + 1, y, targetColor, fillColor);
            floodFill(x - 1, y, targetColor, fillColor);
            floodFill(x, y + 1, targetColor, fillColor);
            floodFill(x, y - 1, targetColor, fillColor);
        }

        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const { x, y } = getPixelCoords(e);

            if (currentTool === 'pen') {
                setPixel(x, y, currentColor);
                drawGrid();
            } else if (currentTool === 'eraser') {
                setPixel(x, y, '#FFFFFF');
                drawGrid();
            } else if (currentTool === 'fill') {
                const targetColor = pixels[y][x];
                floodFill(x, y, targetColor, currentColor);
                drawGrid();
                saveHistory();
            } else if (currentTool === 'eyedropper') {
                currentColor = pixels[y][x];
                document.getElementById('customColor').value = currentColor;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const { x, y } = getPixelCoords(e);

            if (currentTool === 'pen') {
                setPixel(x, y, currentColor);
                drawGrid();
            } else if (currentTool === 'eraser') {
                setPixel(x, y, '#FFFFFF');
                drawGrid();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDrawing && (currentTool === 'pen' || currentTool === 'eraser')) {
                saveHistory();
            }
            isDrawing = false;
        });

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setCanvasSize(size) {
            gridSize = size;
            pixelSize = canvas.width / gridSize;
            initPixels();
            drawGrid();
        }

        function clearCanvas() {
            initPixels();
            drawGrid();
        }

        function saveHistory() {
            historyStep++;
            history = history.slice(0, historyStep);
            history.push(JSON.parse(JSON.stringify(pixels)));
            if (history.length > 50) {
                history.shift();
                historyStep--;
            }
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                pixels = JSON.parse(JSON.stringify(history[historyStep]));
                drawGrid();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                pixels = JSON.parse(JSON.stringify(history[historyStep]));
                drawGrid();
            }
        }

        function saveImage() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = gridSize;
            tempCanvas.height = gridSize;
            const tempCtx = tempCanvas.getContext('2d');

            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    tempCtx.fillStyle = pixels[y][x];
                    tempCtx.fillRect(x, y, 1, 1);
                }
            }

            const link = document.createElement('a');
            link.download = `pixel-art-${Date.now()}.png`;
            link.href = tempCanvas.toDataURL();
            link.click();

            saveToGallery(tempCanvas.toDataURL());
        }

        function loadImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = gridSize;
                        tempCanvas.height = gridSize;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(img, 0, 0, gridSize, gridSize);

                        const imageData = tempCtx.getImageData(0, 0, gridSize, gridSize);
                        for (let y = 0; y < gridSize; y++) {
                            for (let x = 0; x < gridSize; x++) {
                                const i = (y * gridSize + x) * 4;
                                const r = imageData.data[i];
                                const g = imageData.data[i + 1];
                                const b = imageData.data[i + 2];
                                pixels[y][x] = `rgb(${r}, ${g}, ${b})`;
                            }
                        }
                        drawGrid();
                        saveHistory();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function saveToGallery(dataUrl) {
            const gallery = JSON.parse(localStorage.getItem('pixelGallery') || '[]');
            gallery.unshift(dataUrl);
            localStorage.setItem('pixelGallery', JSON.stringify(gallery.slice(0, 20)));
            loadGallery();
        }

        function loadGallery() {
            const gallery = JSON.parse(localStorage.getItem('pixelGallery') || '[]');
            const galleryDiv = document.getElementById('gallery');
            galleryDiv.innerHTML = '';

            gallery.forEach((dataUrl, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                const img = document.createElement('img');
                img.src = dataUrl;
                img.onclick = () => {
                    const tempImg = new Image();
                    tempImg.onload = () => {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = gridSize;
                        tempCanvas.height = gridSize;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(tempImg, 0, 0, gridSize, gridSize);

                        const imageData = tempCtx.getImageData(0, 0, gridSize, gridSize);
                        for (let y = 0; y < gridSize; y++) {
                            for (let x = 0; x < gridSize; x++) {
                                const i = (y * gridSize + x) * 4;
                                const r = imageData.data[i];
                                const g = imageData.data[i + 1];
                                const b = imageData.data[i + 2];
                                pixels[y][x] = `rgb(${r}, ${g}, ${b})`;
                            }
                        }
                        drawGrid();
                        saveHistory();
                    };
                    tempImg.src = dataUrl;
                };
                item.appendChild(img);
                galleryDiv.appendChild(item);
            });
        }

        // Color palette
        const colorGrid = document.getElementById('colorGrid');
        defaultColors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.background = color;
            if (color === currentColor) swatch.classList.add('active');
            swatch.onclick = () => {
                currentColor = color;
                document.getElementById('customColor').value = color;
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
            };
            colorGrid.appendChild(swatch);
        });

        document.getElementById('customColor').addEventListener('input', (e) => {
            currentColor = e.target.value;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        });

        // Initialize
        initPixels();
        drawGrid();
        loadGallery();
    </script>
</body>
</html>
