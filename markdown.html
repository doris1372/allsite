<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor - AllSite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .markdown-container {
            max-width: 1600px;
            margin: 2rem auto;
            padding: 2rem;
        }

        .editor-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .editor-panel {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow);
            display: flex;
            flex-direction: column;
            height: 700px;
        }

        .panel-header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            margin: 0;
        }

        .markdown-input {
            flex: 1;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border: none;
            background: var(--bg);
            color: var(--text);
            resize: none;
            outline: none;
        }

        .markdown-preview {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: var(--bg);
            color: var(--text);
        }

        .markdown-preview h1 {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.5rem;
        }

        .markdown-preview h2 {
            color: var(--primary);
            margin-top: 2rem;
        }

        .markdown-preview code {
            background: var(--card-bg);
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }

        .markdown-preview pre {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
        }

        .markdown-preview blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
            margin-left: 0;
            color: var(--text);
            opacity: 0.8;
        }

        .markdown-preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .markdown-preview th,
        .markdown-preview td {
            border: 1px solid var(--primary);
            padding: 0.8rem;
            text-align: left;
        }

        .markdown-preview th {
            background: var(--primary);
            color: white;
        }

        .toolbar {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--primary);
            flex-wrap: wrap;
        }

        .toolbar button {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .toolbar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 3px 10px var(--shadow);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .action-buttons button {
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .action-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        @media (max-width: 1200px) {
            .editor-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📝 Markdown Editor</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="drawing.html">Drawing</a></li>
            <li><a href="music.html">Music</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="casino.html">Casino</a></li>
            <li><a href="ru.html">RU</a></li>
            <li><a href="index.html">EN</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle">🌙</button>
    </nav>

    <div class="markdown-container">
        <h1 style="text-align: center;">📝 Markdown Editor</h1>

        <div class="action-buttons">
            <button onclick="saveMarkdown()">💾 Save</button>
            <button onclick="loadMarkdown()">📂 Load</button>
            <button onclick="exportHTML()">📄 Export HTML</button>
            <button onclick="exportPDF()">📑 Export PDF</button>
            <button onclick="clearEditor()">🗑️ Clear</button>
        </div>

        <div class="editor-layout">
            <div class="editor-panel">
                <div class="panel-header">
                    <h3>✍️ Markdown Input</h3>
                </div>
                <div class="toolbar">
                    <button onclick="insertMarkdown('# ')">H1</button>
                    <button onclick="insertMarkdown('## ')">H2</button>
                    <button onclick="insertMarkdown('### ')">H3</button>
                    <button onclick="insertMarkdown('**', '**')">Bold</button>
                    <button onclick="insertMarkdown('*', '*')">Italic</button>
                    <button onclick="insertMarkdown('`', '`')">Code</button>
                    <button onclick="insertMarkdown('[', '](url)')">Link</button>
                    <button onclick="insertMarkdown('![', '](url)')">Image</button>
                    <button onclick="insertMarkdown('- ')">List</button>
                    <button onclick="insertMarkdown('> ')">Quote</button>
                    <button onclick="insertMarkdown('---\n')">HR</button>
                    <button onclick="insertTable()">Table</button>
                </div>
                <textarea class="markdown-input" id="markdownInput" placeholder="Write your markdown here..."></textarea>
            </div>

            <div class="editor-panel">
                <div class="panel-header">
                    <h3>👁️ Preview</h3>
                </div>
                <div class="markdown-preview" id="preview"></div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        // Markdown Editor
        const input = document.getElementById('markdownInput');
        const preview = document.getElementById('preview');

        // Simple markdown parser
        function parseMarkdown(text) {
            // Headers
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            text = text.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            text = text.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            text = text.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
            text = text.replace(/__(.*?)__/gim, '<strong>$1</strong>');

            // Italic
            text = text.replace(/\*(.*?)\*/gim, '<em>$1</em>');
            text = text.replace(/_(.*?)_/gim, '<em>$1</em>');

            // Code blocks
            text = text.replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>');

            // Inline code
            text = text.replace(/`(.*?)`/gim, '<code>$1</code>');

            // Links
            text = text.replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>');

            // Images
            text = text.replace(/!\[(.*?)\]\((.*?)\)/gim, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 10px;">');

            // Blockquotes
            text = text.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Horizontal rule
            text = text.replace(/^---$/gim, '<hr>');

            // Unordered lists
            text = text.replace(/^\* (.*$)/gim, '<li>$1</li>');
            text = text.replace(/^- (.*$)/gim, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Ordered lists
            text = text.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');

            // Line breaks
            text = text.replace(/\n\n/gim, '</p><p>');
            text = text.replace(/\n/gim, '<br>');

            // Wrap in paragraphs
            text = '<p>' + text + '</p>';

            // Clean up
            text = text.replace(/<p><\/p>/gim, '');
            text = text.replace(/<p>(<h[1-6]>)/gim, '$1');
            text = text.replace(/(<\/h[1-6]>)<\/p>/gim, '$1');
            text = text.replace(/<p>(<ul>)/gim, '$1');
            text = text.replace(/(<\/ul>)<\/p>/gim, '$1');
            text = text.replace(/<p>(<pre>)/gim, '$1');
            text = text.replace(/(<\/pre>)<\/p>/gim, '$1');
            text = text.replace(/<p>(<blockquote>)/gim, '$1');
            text = text.replace(/(<\/blockquote>)<\/p>/gim, '$1');
            text = text.replace(/<p><hr><\/p>/gim, '<hr>');

            return text;
        }

        function updatePreview() {
            const markdown = input.value;
            preview.innerHTML = parseMarkdown(markdown);
        }

        input.addEventListener('input', updatePreview);

        function insertMarkdown(before, after = '') {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selectedText = text.substring(start, end);

            const newText = text.substring(0, start) + before + selectedText + after + text.substring(end);
            input.value = newText;

            const newCursorPos = start + before.length + selectedText.length;
            input.setSelectionRange(newCursorPos, newCursorPos);
            input.focus();
            updatePreview();
        }

        function insertTable() {
            const table = '\n| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n| Cell 4   | Cell 5   | Cell 6   |\n';
            const start = input.selectionStart;
            const text = input.value;
            input.value = text.substring(0, start) + table + text.substring(start);
            input.focus();
            updatePreview();
        }

        function saveMarkdown() {
            const markdown = input.value;
            localStorage.setItem('savedMarkdown', markdown);

            // Also download as file
            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `markdown-${Date.now()}.md`;
            a.click();

            alert('✅ Markdown saved!');
        }

        function loadMarkdown() {
            const saved = localStorage.getItem('savedMarkdown');
            if (saved) {
                input.value = saved;
                updatePreview();
                alert('✅ Markdown loaded!');
            } else {
                // Create file input for loading
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.md,.txt';
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            input.value = event.target.result;
                            updatePreview();
                        };
                        reader.readAsText(file);
                    }
                };
                fileInput.click();
            }
        }

        function exportHTML() {
            const html = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Export</title>
    <style>
        body {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        h1 { color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        h2 { color: #667eea; margin-top: 30px; }
        code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; }
        pre { background: #f0f0f0; padding: 15px; border-radius: 10px; overflow-x: auto; }
        blockquote { border-left: 4px solid #667eea; padding-left: 15px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #667eea; color: white; }
        img { max-width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
${preview.innerHTML}
</body>
</html>`;

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `markdown-export-${Date.now()}.html`;
            a.click();

            alert('✅ HTML exported!');
        }

        function exportPDF() {
            alert('📑 PDF export would require a backend service. HTML export is available!');
        }

        function clearEditor() {
            if (confirm('Are you sure you want to clear the editor?')) {
                input.value = '';
                updatePreview();
            }
        }

        // Load sample markdown on first visit
        if (!localStorage.getItem('markdownVisited')) {
            input.value = `# Welcome to Markdown Editor

## Features

This is a **powerful** markdown editor with *live preview*.

### What you can do:

- Write markdown
- See live preview
- Export to HTML
- Save and load documents

### Code Example

\`\`\`javascript
function hello() {
    console.log("Hello World!");
}
\`\`\`

### Inline Code

Use \`console.log()\` for debugging.

### Links

Visit [AllSite](index.html) for more tools!

### Blockquote

> This is a blockquote
> It can span multiple lines

### Table

| Feature | Status |
|---------|--------|
| Preview | ✅ |
| Export  | ✅ |
| Save    | ✅ |

---

**Happy writing!** 🎉`;
            updatePreview();
            localStorage.setItem('markdownVisited', 'true');
        }

        // Keyboard shortcuts
        input.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'b') {
                    e.preventDefault();
                    insertMarkdown('**', '**');
                } else if (e.key === 'i') {
                    e.preventDefault();
                    insertMarkdown('*', '*');
                } else if (e.key === 's') {
                    e.preventDefault();
                    saveMarkdown();
                }
            }
        });
    </script>
</body>
</html>
